name: Build and Deploy (self-hosted Windows runner)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 1️⃣ Wake up Docker Desktop (nếu Resource Saver đang bật)
      - name: Wake up Docker 🐳
        shell: powershell
        run: |
          Write-Host "Waking up Docker..."
          docker info
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Docker not available"
            exit 1
          }

      # 2️⃣ Chờ Docker engine thật sự sẵn sàng
      - name: Wait for Docker Engine 🕒
        shell: powershell
        run: |
          $max = 30
          for ($i = 1; $i -le $max; $i++) {
            try {
              docker info > $null 2>&1
              Write-Host "Docker is ready"
              exit 0
            } catch {
              Write-Host "Docker not ready yet ($i/$max)..."
              Start-Sleep -Seconds 5
            }
          }
          Write-Error "Docker engine not available"
          exit 1

      # 3️⃣ Tạo file Build Info
      - name: Create Build Info 📝
        shell: powershell
        run: |
          $buildInfo = @{
            buildTime = (Get-Date).ToString("yyyy-MM-ddTHH:mm:sszzz")
            commit    = "${{ github.sha }}"
            branch    = "${{ github.ref_name }}"
            runId     = [int]${{ github.run_number }}
          } | ConvertTo-Json -Depth 3

          $buildInfo | Out-File -Encoding utf8 buildinfo.json
      
      # 4️⃣ Build và Deploy với Docker Compose
      - name: Build & Deploy 🚀
        shell: powershell
        run: |
          docker compose pull
          docker compose build --no-cache
          docker compose down
          docker compose up -d

name: Build and Deploy (self-hosted Windows runner)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 1️⃣ Wake up Docker Desktop (nếu Resource Saver đang bật)
      - name: Wake up Docker 🐳
        shell: powershell
        run: |
          Write-Host "Waking up Docker Desktop..."
          docker info || exit 1

      # 2️⃣ Chờ Docker engine thật sự sẵn sàng
      - name: Wait for Docker Engine 🕒
        shell: powershell
        run: |
          $max = 30
          for ($i = 1; $i -le $max; $i++) {
            try {
              docker info > $null 2>&1
              Write-Host "Docker is ready"
              exit 0
            } catch {
              Write-Host "Docker not ready yet ($i/$max)..."
              Start-Sleep -Seconds 5
            }
          }
          Write-Error "Docker engine not available"
          exit 1

      # 3️⃣ Deploy
      - name: Build & Deploy 🚀
        shell: powershell
        run: |
          docker compose pull
          docker compose build --no-cache
          docker compose down
          docker compose up -d

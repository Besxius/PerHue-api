version: "3.9"

services:
    perhue-api:
        container_name: perhue-api
        build:
            context: .
            dockerfile: Dockerfile
        image: perhue/perhue-api:latest
        ports:
            - "8080:8080"
            - "8081:8081"
        environment:
            ASPNETCORE_ENVIRONMENT: "Development"
        restart: always
